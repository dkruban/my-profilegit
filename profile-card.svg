<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');
    .avatar-text { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 28px; fill: url(#grad1); }
    .name-text { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 22px; fill: #fff; }
    .title-text { font-family: 'Share Tech Mono', monospace; font-size: 12px; fill: #bd00ff; }
    .btn-text { font-family: 'Orbitron', sans-serif; font-size: 10px; fill: #000; font-weight: 700; }
    
    /* Simple Animations */
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0% { opacity: 0.6; r: 58; } 50% { opacity: 1; r: 62; } 100% { opacity: 0.6; r: 58; } }
    @keyframes scan { 0% { y: 18; opacity: 0.4; } 50% { y: 382; opacity: 0; } 100% { y: 18; opacity: 0.4; } }
    
    .rotating { transform-origin: 200px 200px; animation: rotate 10s linear infinite; }
    .pulsing-circle { animation: pulse 2s infinite ease-in-out; }
    .scanning-line { animation: scan 3s linear infinite; }
  </style>

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0000ff;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="20" fill="#000913"/>
  
  <!-- Scanning Line -->
  <line x1="18" y1="80" x2="382" y2="80" stroke="#0ff" stroke-width="1" class="scanning-line" />

  <!-- Border -->
  <rect x="12" y="12" width="376" height="376" rx="22" fill="rgba(0,5,20,0.85)" stroke="url(#grad1)" stroke-width="3" />
  <rect x="18" y="18" width="364" height="364" rx="18" fill="none" stroke="#0ff" stroke-width="1" stroke-dasharray="8 4" class="rotating" />

  <!-- Avatar Ring -->
  <circle cx="200" cy="175" r="60" fill="none" stroke="url(#grad1)" stroke-width="3" class="pulsing-circle" filter="url(#glow)" />
  <circle cx="200" cy="175" r="52" fill="#0a0520"/>
  <text x="200" y="185" text-anchor="middle" class="avatar-text" filter="url(#glow)">R.M</text>

  <!-- Name & Title -->
  <text x="200" y="268" text-anchor="middle" class="name-text" filter="url(#glow)" letter-spacing="3">RUBAN.M</text>
  <line x1="120" y1="275" x2="280" y2="275" stroke="url(#grad1)" stroke-width="1" />
  <text x="200" y="295" text-anchor="middle" class="title-text" letter-spacing="4">▸ AI PROMPTER ◂</text>

  <!-- Launch Button Area -->
  <a href="https://dkruban.github.io" target="_blank">
    <rect x="135" y="330" width="130" height="34" rx="17" fill="url(#grad1)" filter="url(#glow)" />
    <text x="200" y="351" text-anchor="middle" class="btn-text" letter-spacing="2">LAUNCH ↗</text>
  </a>

  <!-- Status -->
  <text x="30" y="380" font-family="monospace" font-size="7" fill="#0ff" letter-spacing="1">SYS:OK</text>
  <text x="380" y="380" font-family="monospace" font-size="7" fill="#0ff" letter-spacing="1" text-anchor="end">99%</text>

</svg>
